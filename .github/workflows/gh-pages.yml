name: Publish GitHub Pages

# Controls when the action will run.
on:
  workflow_dispatch:
    inputs:
      save_data_in_github_cache:
        required: true
        type: boolean
        default: false
      data_cache_prefix:
        required: true
        type: string
        default: track_data
  workflow_call:
    inputs:
      save_data_in_github_cache:
        required: true
        type: boolean
        default: false
      data_cache_prefix:
        required: true
        type: string
        default: track_data

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build_and_deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Cache Data Files
        if: inputs.save_data_in_github_cache
        uses: actions/cache@v4
        with:
          path: |
            activities
            assets
            GPX_OUT
            TCX_OUT
            FIT_OUT
            Workouts
            run_page/data.db
            src/static/activities.json
            imported.json
          key: ${{ inputs.data_cache_prefix }}-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            ${{ inputs.data_cache_prefix }}-${{ github.sha }}-
            ${{ inputs.data_cache_prefix }}-

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable corepack
        run: npm install -g corepack@latest && corepack enable pnpm

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build

      - name: Publish to gh-pages branch
        env:
          TARGET_BRANCH: gh-pages
          CUSTOM_DOMAIN: run.p1neapple.cc
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          git fetch origin "$TARGET_BRANCH"
          git worktree add -B "$TARGET_BRANCH" "$publish_dir" "origin/$TARGET_BRANCH"
          find "$publish_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. "$publish_dir"/
          touch "$publish_dir"/.nojekyll
          printf '%s\n' "$CUSTOM_DOMAIN" > "$publish_dir"/CNAME
          git -C "$publish_dir" add -A
          if git -C "$publish_dir" diff --cached --quiet; then
            echo "No changes to publish"
          else
            git -C "$publish_dir" config user.name "${{ github.actor }}"
            git -C "$publish_dir" config user.email "${{ github.actor }}@users.noreply.github.com"
            git -C "$publish_dir" commit -m "Deploy site"
            git -C "$publish_dir" push origin "$TARGET_BRANCH"
          fi
